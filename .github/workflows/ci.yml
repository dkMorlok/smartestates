name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: realitni
          POSTGRES_PASSWORD: realitni_dev_password
          POSTGRES_DB: realitni
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      PYTHONPATH: src
      DATABASE_URL: postgresql+psycopg://realitni:realitni_dev_password@localhost:5432/realitni
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      S3_ENDPOINT_URL: ""
      S3_ACCESS_KEY: dummy
      S3_SECRET_KEY: dummy
      S3_BUCKET_RAW: raw-listings
      S3_BUCKET_PHOTOS: listing-photos

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Migrate
        run: alembic upgrade head

      - name: Tests
        run: pytest -ra --cov=src --cov-report=term-missing
